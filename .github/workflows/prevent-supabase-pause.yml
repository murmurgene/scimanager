name: Prevent Supabase Pause

on:
  schedule:
    # Run at 00:00 UTC every day
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  ping-supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase Database
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          # 1. Fallback to default credentials if secrets are not set
          SUPABASE_URL="${SUPABASE_URL:-https://muprmzkvrjacqatqxayf.supabase.co}"
          SUPABASE_ANON_KEY="${SUPABASE_ANON_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im11cHJtemt2cmphY3FhdHF4YXlmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTk1MjYwNzAsImV4cCI6MjA3NTEwMjA3MH0.K2MO-l6QG5nztCPlT3_zqYOrMt-bqM-O5ZYLQpV1L9Y}"

          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "Error: Secrets SUPABASE_URL and/or SUPABASE_ANON_KEY are not set and no fallback available."
            exit 1
          fi

          # 2. Normalize URL (remove trailing slash)
          CLEAN_URL=$(echo "$SUPABASE_URL" | sed 's/\/*$//')
          echo "Pinging Supabase at $CLEAN_URL..."
          
          # 3. Send request and capture both body and status code
          response_file=$(mktemp)
          http_code=$(curl -s -w "%{http_code}" -o "$response_file" \
            -X GET "$CLEAN_URL/rest/v1/experiment_kit?select=id&limit=1" \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY")
          
          response_body=$(cat "$response_file")
          
          if [ "$http_code" -ge 200 ] && [ "$http_code" -lt 300 ]; then
            echo "Successfully pinged Supabase (HTTP $http_code)"
          else
            echo "Failed to ping Supabase (HTTP $http_code)"
            echo "Response Body: $response_body"
            exit 1
          fi
